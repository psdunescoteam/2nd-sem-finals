<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIL - Grade 12 Quiz App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- SVG Gradient Definitions -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
            </linearGradient>
        </defs>
    </svg>

    <div class="quiz-container">
        <!-- Header -->
        <header class="quiz-header">
            <div class="quiz-header-content">
                <div class="quiz-header-main">
                    <div class="quiz-header-left">
                        <button class="back-btn" onclick="window.location.href='index.html'">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <div class="quiz-title-section">
                            <div class="quiz-subject-badge">
                                <i class="fas fa-laptop-code"></i>
                                <span>MIL</span>
                            </div>
                            <h1 class="quiz-main-title">MIL Quiz</h1>
                        </div>
                    </div>
                    <div class="quiz-header-right">
                        <button class="theme-toggle-nav" onclick="toggleTheme()" aria-label="Toggle dark mode" title="Toggle theme">
                            <i class="fas fa-moon"></i>
                            <i class="fas fa-sun"></i>
                        </button>
                        <div class="progress-stats">
                            <div class="question-indicator">
                                <span class="current-q" id="current-question">1</span>
                                <span class="separator">/</span>
                                <span class="total-q" id="total-questions">67</span>
                            </div>
                            <div class="percentage-circle">
                                <svg class="progress-ring" width="40" height="40">
                                    <circle class="progress-ring-bg" cx="20" cy="20" r="16" />
                                    <circle class="progress-ring-fill" cx="20" cy="20" r="16" id="progress-ring" />
                                </svg>
                                <span class="percentage-text" id="progress-percent">1%</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-track">
                        <div class="progress-fill" id="progress-fill"></div>
                        <div class="progress-glow" id="progress-glow"></div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Quiz Content -->
        <main class="quiz-main">
            <div class="quiz-content">
                <!-- Question Card -->
                <div class="question-card">
                    <div class="question-number">
                        <span id="question-num">Question 1</span>
                    </div>
                    <div class="question-text">
                        <h2 id="question-text">Loading question...</h2>
                    </div>
                    <div class="options-container" id="options-container">
                        <!-- Options will be dynamically generated -->
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div class="quiz-controls">
                    <button class="btn-secondary" id="prev-btn" disabled>
                        <i class="fas fa-chevron-left"></i> Previous
                    </button>
                    <div class="question-status">
                        <span id="answered-count">0</span> of <span id="total-count">67</span> answered
                    </div>
                    <button class="btn-primary" id="next-btn" disabled>
                        Select an Answer
                    </button>
                </div>
            </div>
        </main>

        <!-- Quiz Summary Modal -->
        <div class="quiz-summary-modal" id="summary-modal">
            <div class="modal-backdrop"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-check-circle"></i> Quiz Complete!</h3>
                </div>
                <div class="modal-body">
                    <div class="summary-stats">
                        <div class="stat-item">
                            <div class="stat-number" id="correct-answers">0</div>
                            <div class="stat-label">Correct</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="incorrect-answers">0</div>
                            <div class="stat-label">Incorrect</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="final-score">0%</div>
                            <div class="stat-label">Score</div>
                        </div>
                    </div>
                    <div class="score-message" id="score-message">
                        Great job! You've completed the quiz.
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="window.location.href='index.html'">
                        <i class="fas fa-home"></i> Back to Home
                    </button>
                    <button class="btn-primary" onclick="quizSystem.showResults()">
                        <i class="fas fa-chart-line"></i> View Results
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/quiz-data.js"></script>
    <script src="js/quiz-system.js"></script>
</body>
</html>
